<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — MongoDB Learning Platform</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-shell">
  <header class="topbar">
    <div class="logo"><a href="index.html" style="color:inherit;text-decoration:none">🍃 <span>MongoDB</span></a></div>
    <div class="spacer"></div>
    <div class="streak-chip">🔥 <span id="streak-val">0</span></div>
  </header>
  <nav class="sidebar">
    <a class="nav-item" href="index.html"><span class="icon">🏠</span><span class="label">Home</span></a>
    <a class="nav-item active" href="dashboard.html"><span class="icon">📊</span><span class="label">Dashboard</span></a>
    <a class="nav-item" href="playground.html"><span class="icon">⚡</span><span class="label">Playground</span></a>
  </nav>
  <main class="main">
    <div class="page-header">
      <h1>Your Dashboard 📊</h1>
      <p>Track your MongoDB mastery progress and interview readiness.</p>
    </div>
    <div id="dashboard-content">
      <div class="card" style="text-align:center;padding:40px;color:var(--text-muted)">Loading dashboard…</div>
    </div>
  </main>
</div>
<script src="js/session.js"></script>
<script src="js/api.js"></script>
<script src="js/components/toast.js"></script>
<script>
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

(async () => {
  await Session.ensureSession();
  try {
    const dash = await API.get('/api/dashboard');
    document.getElementById('streak-val').textContent = dash.streakCount;

    const pct = dash.interviewReadinessScore;
    const scoreColor = pct >= 70 ? 'var(--green)' : pct >= 40 ? 'var(--accent2)' : 'var(--red)';
    const scoreLabel = pct >= 80 ? 'Interview Ready 🚀' : pct >= 50 ? 'Getting There 📈' : 'Keep Practicing 💪';

    const weakHtml = dash.weakAreas.length
      ? dash.weakAreas.map(w => `
          <div class="weak-area-item">
            <div>
              <div class="topic">${escHtml(w.topic)}</div>
              <div class="module">Module ${w.moduleId}: ${escHtml(w.moduleName)}</div>
            </div>
            <div class="accuracy">${Math.round(w.accuracy * 100)}%</div>
            <a class="btn btn-secondary btn-sm" href="quiz.html?m=${w.moduleId}">Practice</a>
          </div>`).join('')
      : '<div class="card-sm" style="color:var(--text-muted);text-align:center">No weak areas detected yet — keep answering questions!</div>';

    const activityHtml = dash.recentActivity.length
      ? dash.recentActivity.map(a => `
          <div class="activity-item">
            <div class="result ${a.isCorrect ? 'correct' : 'wrong'}">${a.isCorrect ? '✓' : '✗'}</div>
            <div class="topic">${escHtml(a.topic)} <span style="color:var(--text-muted);font-size:0.75rem">(Module ${a.moduleId})</span></div>
            <div class="diff"><span class="badge badge-${a.difficulty}">${a.difficulty}</span></div>
          </div>`).join('')
      : '<div style="color:var(--text-muted);text-align:center;padding:20px">No activity yet — start a quiz!</div>';

    const modulesHtml = dash.modules.map(m => `
      <div class="card card-sm" style="margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
          <span style="font-size:1.5rem">${m.icon}</span>
          <div style="flex:1">
            <div style="font-weight:700;font-size:0.95rem">${escHtml(m.title)}</div>
            <div style="font-size:0.78rem;color:var(--text-muted)">${m.accuracy}% accuracy</div>
          </div>
          <a class="btn btn-secondary btn-sm" href="quiz.html?m=${m.id}">Practice</a>
          <a class="btn btn-secondary btn-sm" href="lesson.html?m=${m.id}&l=1">Read</a>
        </div>
        <div class="progress-bar">
          <div class="progress-bar-fill" style="width:${m.completion}%"></div>
        </div>
        <div class="progress-label"><span>${m.status}</span><span>${m.completion}% done</span></div>
        ${m.weakAreas.length ? `<div style="margin-top:8px;font-size:0.78rem;color:var(--red)">⚠ Weak areas: ${m.weakAreas.join(', ')}</div>` : ''}
      </div>`).join('');

    document.getElementById('dashboard-content').innerHTML = `
      <div class="stat-row">
        <div class="stat-card"><div class="value">${dash.overallCompletion}%</div><div class="label">Overall Completion</div></div>
        <div class="stat-card gold"><div class="value">${dash.streakCount}</div><div class="label">Current Streak</div></div>
        <div class="stat-card"><div class="value">${dash.totalQuestionsAnswered}</div><div class="label">Questions Answered</div></div>
        <div class="stat-card"><div class="value">${dash.totalCorrect}</div><div class="label">Correct Answers</div></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px">
        <div class="card">
          <div class="score-section">
            <div class="interview-ring" style="--pct:${pct}">
              <div class="score" style="color:${scoreColor}">${pct}</div>
              <div class="score-label">/ 100</div>
            </div>
            <div class="score-details">
              <h3>Interview Readiness</h3>
              <p style="color:${scoreColor};font-weight:700;margin-bottom:8px">${scoreLabel}</p>
              <p>Based on your accuracy across all modules. Answer more questions to improve your score.</p>
              <a class="btn btn-primary btn-sm" style="margin-top:12px" href="quiz.html?m=8">Practice Interview Qs</a>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="section-title">⚠ Weak Areas</div>
          <div class="weak-areas-list">${weakHtml}</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px">
        <div class="card">
          <div class="section-title">📚 Module Progress</div>
          ${modulesHtml}
        </div>
        <div class="card">
          <div class="section-title">🕐 Recent Activity</div>
          <div class="activity-list">${activityHtml}</div>
          <div style="margin-top:16px;display:flex;gap:10px">
            <a class="btn btn-primary btn-sm" href="quiz.html?m=2">Continue Quizzing</a>
            <a class="btn btn-secondary btn-sm" href="playground.html">Open Playground</a>
          </div>
        </div>
      </div>
    `;
  } catch (e) {
    document.getElementById('dashboard-content').innerHTML = `<div class="card"><p style="color:var(--red)">Error: ${e.message}</p></div>`;
  }
})();
</script>
</body>
</html>
